[theme]
base = "dark"
primaryColor = "#8B5CF6"
backgroundColor = "#0F172A"
secondaryBackgroundColor = "#1E293B"
codeBackgroundColor = "#1E293B"
textColor = "#F1F5F9"
linkColor = "#A78BFA"
borderColor = "#334155"
showWidgetBorder = true
showSidebarBorder = true
baseRadius = "8px"
buttonRadius = "8px"
font = "'Inter':https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
codeFont = "'JetBrains Mono':https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
codeFontSize = "0.875rem"

baseFontSize = 14
baseFontWeight = 400
headingFontSizes = ["32px", "24px", "20px", "16px", "14px", "12px"]
headingFontWeights = [700, 600, 600, 600, 600, 600]
linkUnderline = false
chartCategoricalColors = ["#8B5CF6", "#3B82F6", "#10B981", "#EF4444", "#F59E0B", "#EC4899"]

[theme.sidebar]
backgroundColor = "#1E293B"
secondaryBackgroundColor = "#0F172A"
codeBackgroundColor = "#0F172A"
textColor = "#F1F5F9"
borderColor = "#334155"
primaryColor = "#8B5CF6"
